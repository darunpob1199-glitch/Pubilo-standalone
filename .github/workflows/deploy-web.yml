name: Deploy Web Dashboard

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Deploy production dashboard
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "53987ff7a0defba5fae5e72d3feb57ca"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy apps/web --project-name=pubilo-web-prod --branch=main

  deploy-dev:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Deploy dev dashboard
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: "53987ff7a0defba5fae5e72d3feb57ca"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy apps/web --project-name=pubilo-web-dev --branch=dev
